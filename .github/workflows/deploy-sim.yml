name: deploy-sim

on:
  workflow_dispatch:
    inputs:
      artifact_name:
        description: Artifact name from CI
        required: false
        default: zerotouch-package
      package_file:
        description: Specific package file name inside the artifact directory
        required: false
        default: ''
      dry_run:
        description: Resolve package/checksum without copying files
        required: false
        default: false
        type: boolean

jobs:
  deploy:
    uses: ./.github/workflows/_deploy-package.yml
    with:
      artifact_name: ${{ inputs.artifact_name }}
      package_file: ${{ inputs.package_file }}
      drop_folder: ${{ vars.NT8_SIM_DROP_FOLDER }}
      log_folder: ${{ vars.NT8_LOG_FOLDER }}
      require_checksum: false
      dry_run: ${{ inputs.dry_run }}
