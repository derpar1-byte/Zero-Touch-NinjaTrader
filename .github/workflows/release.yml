name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-package:
    uses: ./.github/workflows/_build-package.yml
    with:
      package_version: ${{ github.ref_name }}
      upload_artifact: false
      artifact_name: zerotouch-package

  create-release:
    runs-on: windows-latest
    needs: build-package

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore ZeroTouchNinjaTrader.sln

      - name: Build release package
        shell: pwsh
        run: |
          $versionFromTag = '${{ github.ref_name }}'.TrimStart('v')
          $config = Get-Content 'src/Common/appsettings.json' | ConvertFrom-Json
          ./deploy/package-nt8.ps1 `
            -SourceRoot "src" `
            -OutputRoot "artifacts" `
            -StrategyName "$($config.strategyName)" `
            -PackageName "$($config.name)" `
            -Version "$versionFromTag"

          $files = Get-ChildItem -Path artifacts/exports -Filter *.zip -File
          if (-not $files) {
            throw 'No package archives found in artifacts/exports.'
          }

          foreach ($file in $files) {
            $hash = Get-FileHash -Path $file.FullName -Algorithm SHA256
            "$($hash.Hash) *$($file.Name)" | Out-File -FilePath "$($file.FullName).sha256" -Encoding ascii
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            artifacts/exports/*.zip
            artifacts/exports/*.sha256
            artifacts/packages/*.zip
